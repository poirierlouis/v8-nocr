name: V8 monolithic - Windows

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install LLVM/Clang v22
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path "C:\llvm-clang"
          
          Write-Host "Downloading LLVM 22.1.7"
          $ProgressPreference = 'SilentlyContinue'
          curl.exe -L -o "llvm-clang.tar.xz" "https://github.com/llvm/llvm-project/releases/download/llvmorg-22.1.7/clang+llvm-22.1.7-x86_64-pc-windows-msvc.tar.xz"
          
          Write-Host "Installing LLVM 22.1.7"
          tar -xfv llvm-clang.tar.xz -C "C:\llvm-clang"
          Rename-Item -Path "C:\llvm-clang\clang+llvm-22.1.7-x86_64-pc-windows-msvc" -NewName "22.1.7"
          echo "C:\llvm-clang\22.1.7\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          
          Write-Host "LLVM 22.1.7 installed"

      - name: Install depot_tools
        shell: cmd
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git C:\depot_tools
          echo C:\depot_tools >> %GITHUB_PATH%

      - name: Configure depot_tools
        shell: cmd
        run: |
          set DEPOT_TOOLS_WIN_TOOLCHAIN=0
          call gclient

      - name: Fetch V8 Source Code
        shell: cmd
        env:
          DEPOT_TOOLS_WIN_TOOLCHAIN: 0
        run: |
          mkdir v8
          cd v8
          call fetch v8
          cd v8
          git checkout 14.6.202.34
          call gclient sync -D --force --reset

      - name: Apply V8 Patches
        shell: cmd
        run: |
          cd v8\v8
          copy ..\..\win\x64\args.gn out\release\args.gn
          git apply ..\..\win\x64\patches\14.6.202.34.patch

      - name: Run GN Gen
        shell: cmd
        env:
          DEPOT_TOOLS_WIN_TOOLCHAIN: 0
        run: |
          cd v8\v8
          call gn gen out\release

      - name: Compile V8 monolithic
        shell: cmd
        env:
          DEPOT_TOOLS_WIN_TOOLCHAIN: 0
        run: |
          cd v8\v8
          call ninja -C out\release v8_monolithic

      - name: Stage Artifact
        shell: cmd
        run: |
          mkdir dist\lib
          mkdir dist\include
          
          copy v8\v8\out\release\obj\v8_monolith.lib dist\lib\
          xcopy v8\v8\include\*.h dist\include /E /I /Y

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: v8-14.6.202.34-win64
          path: dist/